# Enables the configuration cache for faster builds.
# https://docs.gradle.org/current/userguide/configuration_cache.html
org.gradle.configuration-cache=true

# Enables parallel execution for faster builds.
# https://docs.gradle.org/current/userguide/performance.html#parallel_execution
org.gradle.parallel=true

# Sets the JVM arguments for the Gradle Daemon.
# https://docs.gradle.org/current/userguide/build_environment.html#sec:gradle_daemon_jvm_configuration
org.gradle.jvmargs=-Xmx2048m

# Specifies whether the build should fail on deprecation warnings.
# https://docs.gradle.org/current/userguide/upgrading_version_8.html#feature_level_deprecations
org.gradle.warning.mode=fail
